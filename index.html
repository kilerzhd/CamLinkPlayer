<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamLink Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="video-container">
        <!-- The video element where the capture card stream will be displayed -->
        <video id="stream-video" autoplay playsinline></video>
        
        <!-- UI Overlay that auto-hides -->
        <div id="ui-overlay" class="visible">
            <div class="glass-panel" id="main-panel">
                <button id="toggle-ui-btn" class="toggle-btn" title="Réduire/Agrandir le Menu">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M18 15l-6-6-6 6"></path>
                    </svg>
                </button>
                <h1>CamLink Player</h1>
                
                <div class="controls-group">
                    <div class="select-wrapper">
                        <label for="language-select" data-i18n="language">Langue</label>
                        <select id="language-select">
                            <option value="fr">Français</option>
                            <option value="en">English</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <label for="video-source" data-i18n="videoSource">Source Vidéo</label>
                        <select id="video-source">
                            <option value="" data-i18n="loading">Chargement...</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <label for="audio-source" data-i18n="audioSource">Source Audio</label>
                        <select id="audio-source">
                            <option value="" data-i18n="loading">Chargement...</option>
                        </select>
                    </div>

                    <div class="slider-wrapper">
                        <div class="slider-header">
                            <label for="audio-delay" data-i18n="audioDelay">Délai Audio (Sync)</label>
                            <span id="delay-val">80 ms</span>
                        </div>
                        <input type="range" id="audio-delay" min="0" max="300" value="80">
                    </div>
                </div>

                <div class="actions">
                    <button id="start-btn" class="primary-btn" data-i18n="start">Démarrer</button>
                    <button id="fullscreen-btn" class="icon-btn" title="Plein Écran" data-i18n-title="fullscreen">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Script that handles logic -->
    <script src="renderer.js"></script>
</body>
</html>
